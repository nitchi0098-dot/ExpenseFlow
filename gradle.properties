# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from the command line, check
# build.gradle files instead.

# When configured, Gradle will run in incubator mode
# android.useNewApkCreationProcess=true

# Androidx package structure to make it unambiguous which package your item came from.
android.useAndroidX=true

# Kotlin code style for this project: "official" or "obsolete":
kotlin.code.style=official

# Enables namespacing of each library's R class so that its R class includes only the
# resources declared in the library itself and does nothing about resources declared in
# library dependencies.
android.nonTransitiveRClass=true
